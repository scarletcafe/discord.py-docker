name: "Build Docker images"

on:
  push:
    branches:
      - master
  schedule:
    - cron: "0 12 * * 0,2,4,6"

env:

  PYTHON_3_10_IMAGE: "3.10.20"
  PYTHON_3_10_TAGS: "3.10.20 3.10"

  PYTHON_3_11_IMAGE: "3.11.15"
  PYTHON_3_11_TAGS: "3.11.15 3.11"

  PYTHON_3_12_IMAGE: "3.12.13"
  PYTHON_3_12_TAGS: "3.12.13 3.12"

  PYTHON_3_13_IMAGE: "3.13.13"
  PYTHON_3_13_TAGS: "3.13.13 3.13"

  PYTHON_3_14_IMAGE: "3.14.4"
  PYTHON_3_14_TAGS: "3.14.4 3.14 ."

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Ensure login succeeds for Docker Hub and GitHub registry
        shell: bash
        run: |
          echo "${{ secrets.DOCKER_LOGIN_PASSWORD }}" | docker login --username "${{ secrets.DOCKER_LOGIN_USERNAME }}" --password-stdin
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login docker.pkg.github.com -u ${{ github.actor }} --password-stdin

      - name: Always regenerate dockerfiles folder
        shell: bash
        run: |
          rm -rf dockerfiles
          pip install -U pip
          pip install -U -r requirements.txt
          python generate.py
          cd dockerfiles
          find ./ -name "*.sh" -exec chmod +x {} \;
          cd ..

      - uses: actions/upload-artifact@v7
        with:
          name: dockerfiles-1
          path: dockerfiles

  minimal:
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      max-parallel: 8
      matrix:
        python-version: [3_10, 3_11, 3_12, 3_13, 3_14]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: dockerfiles-1
          path: dockerfiles

      - name: Build minimal containers
        shell: bash
        run: |
          export GIT_HEAD="`git rev-list --count HEAD || echo unknown`+`git rev-parse --short HEAD || echo unknown`"
          echo "${{ secrets.DOCKER_LOGIN_PASSWORD }}" | docker login --username "${{ secrets.DOCKER_LOGIN_USERNAME }}" --password-stdin
          cd dockerfiles
          find ./ -name "*.sh" -exec chmod +x {} \;
          ./deploy_target.sh 0_minimal ${PYTHON_${{ matrix.python-version }}_IMAGE}
          cd ..

  full:
    runs-on: ubuntu-latest
    needs: minimal
    strategy:
      max-parallel: 8
      matrix:
        python-version: [3_10, 3_11, 3_12, 3_13, 3_14]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: dockerfiles-1
          path: dockerfiles

      - name: Build full containers
        shell: bash
        run: |
          export GIT_HEAD="`git rev-list --count HEAD || echo unknown`+`git rev-parse --short HEAD || echo unknown`"
          echo "${{ secrets.DOCKER_LOGIN_PASSWORD }}" | docker login --username "${{ secrets.DOCKER_LOGIN_USERNAME }}" --password-stdin
          cd dockerfiles
          find ./ -name "*.sh" -exec chmod +x {} \;
          ./deploy_target.sh 1_full ${PYTHON_${{ matrix.python-version }}_IMAGE}
          cd ..

  extras:
    runs-on: ubuntu-latest
    needs: full
    strategy:
      max-parallel: 8
      matrix:
        python-version: [3_10, 3_11, 3_12, 3_13, 3_14]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: dockerfiles-1
          path: dockerfiles

      - name: Build extras containers
        shell: bash
        run: |
          export GIT_HEAD="`git rev-list --count HEAD || echo unknown`+`git rev-parse --short HEAD || echo unknown`"
          echo "${{ secrets.DOCKER_LOGIN_PASSWORD }}" | docker login --username "${{ secrets.DOCKER_LOGIN_USERNAME }}" --password-stdin
          cd dockerfiles
          find ./ -name "*.sh" -exec chmod +x {} \;
          ./deploy_target.sh 2_extra ${PYTHON_${{ matrix.python-version }}_IMAGE}
          cd ..

  final:
    runs-on: ubuntu-latest
    needs: extras
    strategy:
      max-parallel: 8
      matrix:
        python-version: [3_10, 3_11, 3_12, 3_13, 3_14]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: dockerfiles-1
          path: dockerfiles

      - name: Build final containers
        shell: bash
        run: |
          export GIT_HEAD="`git rev-list --count HEAD || echo unknown`+`git rev-parse --short HEAD || echo unknown`"
          echo "${{ secrets.DOCKER_LOGIN_PASSWORD }}" | docker login --username "${{ secrets.DOCKER_LOGIN_USERNAME }}" --password-stdin
          cd dockerfiles
          find ./ -name "*.sh" -exec chmod +x {} \;
          ./deploy_target.sh discordpy ${PYTHON_${{ matrix.python-version }}_IMAGE}
          cd ..
