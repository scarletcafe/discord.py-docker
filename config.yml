
# this file works as a combination of Dockerfile arguments and Docker tags
# x: ["y", "z"] means the variable is x, and it is reflected in Docker tags y and z.
# tags should decrease in specificity along the list
# a blank tag means it is implicit when omitted
# this is used to automatically generate the Dockerfiles, metadata and readme.

# When updating this ALSO UPDATE .github/workflows/docker-build.yml !!
python_versions:
  "3.14.4":     ["3.14.4", "3.14", ""]
  "3.13.13":    ["3.13.13", "3.13"]
  "3.12.13":    ["3.12.13", "3.12"]
  "3.11.15":    ["3.11.15", "3.11"]
  "3.10.20":    ["3.10.20", "3.10"]

distros:
  trixie: ["trixie", ""]
  slim-trixie: ["slim-trixie", "slim"]
  bookworm: ["bookworm"]
  slim-bookworm: ["slim-bookworm"]
  alpine: ["alpine"]

checkouts:
  master: ["master", "dev", "2.8.0a", "2.8a"]
  "": ["pypi", "2.7", "2", ""]

# these don't follow the above syntax as they're just pulled by the templates
minor_deps:
  asyncpg: asyncpg
  click: click
  coverage: coverage
  flake8: flake8
  lxml: lxml
  matplotlib: matplotlib
  Pillow: Pillow
  psutil: psutil
  pycryptodome: pycryptodome
  pylint: pylint
  pytest-cov: pytest-cov
  PyYAML: PyYAML
  ruamel.yaml: "ruamel.yaml"
  toml: toml
  twine: twine

major_deps:
  aiomysql: aiomysql
  beautifulsoup4: beautifulsoup4
  cairosvg: cairosvg
  colorlog: colorlog
  colorthief: colorthief
  fuzzywuzzy: fuzzywuzzy[speedup]
  humanize: humanize
  lru-dict: lru-dict
  objgraph: objgraph
  parsedatetime: parsedatetime
  python-dateutil: python-dateutil
  redis: redis
  sqlalchemy: sqlalchemy
  tabulate: tabulate
  tox: tox
  wand: wand

stage_types:
  0: ['minimal']
  1: ['full', '']
  2: ['extras']
